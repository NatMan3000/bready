<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#fde68a"/>
    </linearGradient>
    <linearGradient id="crust" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>
  <!-- Bread loaf body -->
  <ellipse cx="90" cy="105" rx="55" ry="38" fill="url(#crust)"/>
  <!-- Bread top dome -->
  <ellipse cx="90" cy="88" rx="50" ry="42" fill="url(#top)"/>
  <!-- Score marks -->
  <path d="M50 78 Q65 68, 90 73" stroke="#92400e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M90 73 Q115 68, 130 78" stroke="#92400e" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M55 95 Q90 85, 125 95" stroke="#92400e" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Highlight -->
  <ellipse cx="72" cy="65" rx="12" ry="7" fill="#fde68a" opacity="0.5"/>
</svg>
