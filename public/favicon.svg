<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="crust" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#92400e"/>
    </linearGradient>
    <linearGradient id="top" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <!-- Bread loaf body -->
  <ellipse cx="50" cy="62" rx="40" ry="28" fill="url(#crust)"/>
  <!-- Bread top dome -->
  <ellipse cx="50" cy="50" rx="36" ry="30" fill="url(#top)"/>
  <!-- Score marks -->
  <path d="M25 45 Q35 38, 50 42" stroke="#92400e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M50 42 Q65 38, 75 45" stroke="#92400e" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M30 55 Q50 48, 70 55" stroke="#92400e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Highlight -->
  <ellipse cx="40" cy="38" rx="8" ry="5" fill="#fde68a" opacity="0.5"/>
</svg>
